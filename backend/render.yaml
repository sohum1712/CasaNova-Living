services:
  - type: web
    name: casanova-living
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python startup.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEBUG
        value: false
      - key: LOG_LEVEL
        value: INFO
